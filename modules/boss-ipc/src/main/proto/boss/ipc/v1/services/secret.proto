syntax = "proto3";

package boss.ipc.v1.services;

import "boss/ipc/v1/common.proto";

option java_package = "ai.rever.boss.ipc.proto.services";
option java_multiple_files = true;

// SecretService provides secure credential and secret management to out-of-process plugins.
// The kernel stores secrets in encrypted storage and exposes CRUD and sharing
// operations over gRPC.
service SecretService {
  // Get paginated user secrets
  rpc GetUserSecrets(SecretPaginatedRequest) returns (PaginatedSecretsResponse);

  // Get paginated user secrets with sharing information
  rpc GetUserSecretsWithSharingInfo(SecretPaginatedRequest) returns (PaginatedSecretsWithSharingResponse);

  // Search secrets by query
  rpc SearchSecrets(SearchSecretsRequest) returns (PaginatedSecretsResponse);

  // Create a new secret
  rpc CreateSecret(CreateSecretProtoRequest) returns (SecretOperationResult);

  // Update an existing secret
  rpc UpdateSecret(UpdateSecretProtoRequest) returns (SecretOperationResult);

  // Delete a secret by ID
  rpc DeleteSecret(SecretIdRequest) returns (SecretOperationResult);

  // Get the list of users a secret is shared with
  rpc GetSecretShares(SecretIdRequest) returns (SecretShareListResponse);

  // Share a secret with another user
  rpc ShareSecret(ShareSecretProtoRequest) returns (SecretOperationResult);

  // Revoke sharing of a secret with a user
  rpc UnshareSecret(UnshareSecretProtoRequest) returns (SecretOperationResult);
}

// ---- Secret model ----

message SecretEntryProto {
  string id = 1;
  string website = 2;
  string username = 3;
  string password = 4;
  string notes = 5;
  string expiration_date = 6;
  repeated string tags = 7;
  bool twofa_enabled = 8;
  string twofa_type = 9;
  string twofa_secret = 10;
  repeated string recovery_codes = 11;
  string created_at = 12;
  string updated_at = 13;
  bool is_owner = 14;
  string shared_by_email = 15;
  string access_level = 16;
}

// ---- Secret with sharing info ----

message SecretWithSharingProto {
  SecretEntryProto secret = 1;
  repeated SecretShareProto shares = 2;
}

message SecretShareProto {
  string share_id = 1;
  string shared_with_user_id = 2;
  string shared_with_user_email = 3;
  string shared_with_role_id = 4;
  string shared_with_role_name = 5;
  string access_level = 6;
  string shared_by_email = 7;
  string created_at = 8;
  string expires_at = 9;
  string notes = 10;
}

// ---- Requests ----

message SecretPaginatedRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message SearchSecretsRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message CreateSecretProtoRequest {
  string website = 1;
  string username = 2;
  string password = 3;
  string notes = 4;
  string expiration_date = 5;
  repeated string tags = 6;
  bool twofa_enabled = 7;
  string twofa_type = 8;
  string twofa_secret = 9;
  repeated string recovery_codes = 10;
}

message UpdateSecretProtoRequest {
  string secret_id = 1;
  string website = 2;
  string username = 3;
  string password = 4;
  string notes = 5;
  string expiration_date = 6;
  repeated string tags = 7;
  bool twofa_enabled = 8;
  string twofa_type = 9;
  string twofa_secret = 10;
  repeated string recovery_codes = 11;
}

message SecretIdRequest {
  string id = 1;
}

message ShareSecretProtoRequest {
  string secret_id = 1;
  string target_user_id = 2;
  string target_role_id = 3;
  string notes = 4;
  string expires_at = 5;
}

message UnshareSecretProtoRequest {
  string secret_id = 1;
  string target_user_id = 2;
  string target_role_id = 3;
}

// ---- Responses ----

message PaginatedSecretsResponse {
  repeated SecretEntryProto secrets = 1;
  int32 total_count = 2;
  bool has_more = 3;
  bool success = 4;
  string error_message = 5;
}

message PaginatedSecretsWithSharingResponse {
  repeated SecretWithSharingProto secrets = 1;
  int32 total_count = 2;
  bool has_more = 3;
  bool success = 4;
  string error_message = 5;
}

message SecretShareListResponse {
  repeated SecretShareProto shares = 1;
}

message SecretOperationResult {
  bool success = 1;
  string error_message = 2;
}
