name: ­¤öä Sync Release to Public Repository

on:
  release:
    types: [published]
  # Backup trigger: when the Release Build workflow completes successfully,
  # sync the latest matching release. In practice we have observed the
  # `release: published` trigger above silently skipping the last several
  # releases ŌĆö root cause not yet confirmed (GitHub's recursive-trigger
  # suppression for GITHUB_TOKEN events is one plausible explanation despite
  # release.yml explicitly using PUBLIC_REPO_TOKEN, but other causes like
  # draftŌåÆpublish flow or PAT scope are not ruled out). Either way, hooking
  # off the upstream workflow's completion is a reliable secondary path.
  workflow_run:
    workflows: ["­¤ÜĆ Release Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g., v8.9.0)'
        required: true
        type: string
  push:
    branches: [main]

jobs:
  # Skip job for push events - workflow only syncs on release publish
  # Exists to satisfy required status checks on push
  skip-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping sync-release on push event (only runs on release publish)"

  sync-release:
    # Run for every trigger except push, and for workflow_run only when the
    # upstream Release Build succeeded.
    if: |
      github.event_name != 'push' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    # Serialise ALL sync-release runs with a single static group key.
    #
    # The double-fire we're guarding against (release: published AND
    # workflow_run both reaching this job for the same release) cannot be
    # collapsed via a payload-derived key: the release event exposes
    # target_commitish (which is the branch name "main", not a SHA), while
    # the workflow_run event exposes head_sha ŌĆö they never naturally agree.
    # Resolving the tag in a pre-job would let us key on it, but at the cost
    # of an extra job and another moving part. Sync runs are infrequent (one
    # per release at most), brief, and only ever write to a single public
    # repo, so serialising globally costs nothing meaningful and is simply
    # correct.
    concurrency:
      group: sync-release-global
      cancel-in-progress: false

    steps:
    - name: Checkout private repo
      uses: actions/checkout@v7
      with:
        token: ${{ secrets.PUBLIC_REPO_TOKEN }}
        fetch-depth: 0

    - name: Download release assets
      id: download
      env:
        GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        EVENT_RELEASE_NAME: ${{ github.event.release.name }}
        EVENT_RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        EVENT_RELEASE_BODY: ${{ github.event.release.body }}
        WORKFLOW_RUN_STARTED_AT: ${{ github.event.workflow_run.run_started_at }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail

        # Get release information (handle release event, manual dispatch, and
        # workflow_run fallback when the upstream Release Build completed).
        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          # Trim whitespace from input
          RELEASE_TAG="$(echo "$INPUT_RELEASE_TAG" | xargs)"

          # Validate release tag format
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "ŌØī Invalid release tag format: $RELEASE_TAG"
            echo "   Expected format: v8.16.10 or v8.16.10-beta.1"
            exit 1
          fi

          # Get release info from GitHub API for manual dispatch
          RELEASE_INFO=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
          RELEASE_PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')
        elif [[ "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
          # No release payload on workflow_run, so discover the release this
          # upstream run produced. A Release Build with `create_release: false`
          # (build-only verification) still fires workflow_run.completed, so
          # naively picking the latest release would re-sync a stale one ŌĆö
          # corrupting the public README's date.
          #
          # Discovery strategy: pick the latest release whose created_at is
          # at/after the upstream workflow_run started.
          #
          # NOTE on target_commitish: we deliberately do NOT filter by SHA
          # here, because softprops/action-gh-release is invoked without a
          # target_commitish input and the tag does not pre-exist, so GitHub
          # defaults target_commitish to the branch name ("main") rather
          # than a SHA. A SHA match would always be empty.
          #
          # KNOWN LIMITATION: if an unrelated release happens to be published
          # *during* this workflow's run window (e.g. an alpha cut from a
          # parallel pipeline, a manual hand-cut release for testing), this
          # discovery will pick that release instead of the one our upstream
          # build produced. Today there is only one release pipeline, so this
          # is acceptable; if that changes, add a tag-resolution pre-job and
          # pass the tag explicitly via workflow_call.
          if [[ -z "${WORKFLOW_RUN_STARTED_AT}" ]]; then
            echo "ŌØī workflow_run event missing run_started_at ŌĆö cannot gate on freshness."
            exit 1
          fi
          echo "­¤öŹ workflow_run trigger ŌĆö locating release created at/after ${WORKFLOW_RUN_STARTED_AT}..."
          RUN_STARTED_EPOCH=$(date -d "$WORKFLOW_RUN_STARTED_AT" +%s)
          RELEASE_INFO=""
          # 6 attempts ├Ś 10s = 60s grace for API consistency. The upstream
          # build takes many minutes, so the release is virtually always
          # visible immediately; the loop is purely a defensive cushion.
          # If you see "no fresh release visible yet" flakes in real runs,
          # bumping this budget is cheap.
          for attempt in 1 2 3 4 5 6; do
            # First page only: per_page=10 is more than enough since we just
            # need the most recent release. Don't swallow stderr ŌĆö a 401 or
            # 403 should fail loudly, not be silently treated as no releases.
            ALL_RELEASES=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=10")
            LATEST=$(echo "$ALL_RELEASES" | jq -c '.[0]' || echo "null")
            if [[ "$LATEST" != "null" && -n "$LATEST" ]]; then
              LATEST_CREATED=$(echo "$LATEST" | jq -r '.created_at')
              LATEST_EPOCH=$(date -d "$LATEST_CREATED" +%s)
              # The window is loose by design: run_started_at is when the
              # upstream workflow began, typically many minutes before the
              # release is actually published. Any release stamped within
              # that window from "now" is treated as the one this run made.
              if [[ "$LATEST_EPOCH" -ge "$RUN_STARTED_EPOCH" ]]; then
                RELEASE_INFO="$LATEST"
                echo "  matched latest release (${LATEST_CREATED} >= run start ${WORKFLOW_RUN_STARTED_AT})"
                break
              fi
            fi
            echo "  attempt ${attempt}/6: no fresh release visible yet, waiting 10s..."
            sleep 10
          done
          if [[ -z "$RELEASE_INFO" || "$RELEASE_INFO" == "null" ]]; then
            echo "Ōä╣’ĖÅ  No release was produced by this Release Build run (likely a"
            echo "    create_release=false verification build); nothing to sync."
            exit 0
          fi
          RELEASE_TAG=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
          RELEASE_PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')

          # Defense-in-depth: validate the discovered tag the same way the
          # manual-dispatch branch does, in case a malformed release ever
          # bubbles through (e.g. someone manually created a test release).
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "ŌØī workflow_run discovered release with invalid tag format: $RELEASE_TAG"
            echo "   Expected format: v8.16.10 or v8.16.10-beta.1"
            exit 1
          fi
        else
          # Trim whitespace from event values
          RELEASE_TAG="$(echo "$EVENT_RELEASE_TAG" | xargs)"
          RELEASE_NAME="$EVENT_RELEASE_NAME"
          RELEASE_PRERELEASE="$EVENT_RELEASE_PRERELEASE"
        fi
        
        # Validate required variables
        if [[ -z "${RELEASE_TAG}" ]]; then
          echo "Error: RELEASE_TAG is empty"
          exit 1
        fi

        echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_OUTPUT
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_OUTPUT
        echo "RELEASE_PRERELEASE=${RELEASE_PRERELEASE}" >> $GITHUB_OUTPUT
        
        # Create assets directory
        mkdir -p release-assets
        
        # Wait for assets to be uploaded (with retry mechanism)
        echo "­¤öä Waiting for release assets to be available..."
        MAX_RETRIES=15
        RETRY_COUNT=0
        ASSETS_FOUND=false
        EXPECTED_ASSETS=5  # DMG, DEB, JAR, MSI, RPM
        
        while [[ $RETRY_COUNT -lt $MAX_RETRIES ]]; do
          echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: Checking for assets..."

          # Check if release has assets
          ASSET_COUNT=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.assets | length')

          if [[ "$ASSET_COUNT" -ge "$EXPECTED_ASSETS" ]]; then
            echo "Ō£ģ Found $ASSET_COUNT/$EXPECTED_ASSETS assets, proceeding with download..."
            ASSETS_FOUND=true
            break
          elif [[ "$ASSET_COUNT" -gt 0 ]]; then
            echo "ŌÅ│ Found $ASSET_COUNT/$EXPECTED_ASSETS assets, waiting for more (45 seconds)..."
            sleep 45
            RETRY_COUNT=$((RETRY_COUNT + 1))
          else
            echo "ŌÅ│ No assets found yet, waiting 30 seconds..."
            sleep 30
            RETRY_COUNT=$((RETRY_COUNT + 1))
          fi
        done

        if [[ "$ASSETS_FOUND" == "false" ]]; then
          echo "ŌÜĀ’ĖÅ  No assets found after $MAX_RETRIES attempts"
          echo "This might be normal for releases without binary assets"
        fi
        
        # Download all release assets using GitHub CLI (if any exist)
        if [[ "$ASSETS_FOUND" == "true" ]]; then
          echo "­¤ōź Downloading release assets..."
          gh release download "${RELEASE_TAG}" --dir release-assets --repo "${GITHUB_REPOSITORY}"
        else
          echo "­¤ōØ No assets to download, proceeding with release creation only"
        fi

        # Save release body to file safely
        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
          echo "$RELEASE_INFO" | jq -r '.body' > release-assets/release-body-raw.txt
        else
          printf '%s\n' "$EVENT_RELEASE_BODY" > release-assets/release-body-raw.txt
        fi

        # Fix download URLs: replace private repo with public repo
        # This fixes the 404 errors when users follow the installation guide
        sed 's|risa-labs-inc/BossConsole|risa-labs-inc/BossConsole-Releases|g' release-assets/release-body-raw.txt > release-assets/release-body.txt
        rm release-assets/release-body-raw.txt

        echo "­¤ōØ Updated download URLs to point to public repository"
        
        # List downloaded assets
        echo "­¤ō” Contents of release-assets directory:"
        ls -la release-assets/

    - name: Create public release
      env:
        GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        RELEASE_TAG: ${{ steps.download.outputs.RELEASE_TAG }}
        RELEASE_NAME: ${{ steps.download.outputs.RELEASE_NAME }}
        RELEASE_PRERELEASE: ${{ steps.download.outputs.RELEASE_PRERELEASE }}
        PUBLIC_REPO: risa-labs-inc/BossConsole-Releases
      run: |
        set -euo pipefail

        # Validate required variables
        if [[ -z "${RELEASE_TAG}" ]]; then
          echo "Error: RELEASE_TAG is empty"
          exit 1
        fi

        # Set prerelease flag
        PRERELEASE_FLAG=""
        if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi

        # Prepare assets for upload
        ASSET_FILES=""
        if ls release-assets/* 1> /dev/null 2>&1; then
          for file in release-assets/*; do
            if [[ -f "$file" ]] && [[ "$(basename "$file")" != "release-body.txt" ]]; then
              ASSET_FILES="$ASSET_FILES $file"
            fi
          done
        fi

        # Check if release already exists
        if gh release view "${RELEASE_TAG}" --repo "${PUBLIC_REPO}" >/dev/null 2>&1; then
          echo "­¤ōŗ Release ${RELEASE_TAG} already exists, uploading missing assets..."

          # Get existing assets
          EXISTING_ASSETS=$(gh release view "${RELEASE_TAG}" --repo "${PUBLIC_REPO}" --json assets --jq '.assets[].name')

          # Upload only missing assets
          if [[ -n "$ASSET_FILES" ]]; then
            for file in $ASSET_FILES; do
              FILENAME=$(basename "$file")
              if echo "$EXISTING_ASSETS" | grep -q "^${FILENAME}$"; then
                echo "ŌÅŁ’ĖÅ  Skipping $FILENAME (already exists)"
              else
                echo "­¤ōż Uploading missing asset: $FILENAME"
                gh release upload "${RELEASE_TAG}" "$file" --repo "${PUBLIC_REPO}"
              fi
            done
          fi

          echo "Ō£ģ Assets synchronized for existing release ${RELEASE_TAG}"
        else
          # Create release in public repository
          if [[ -n "$ASSET_FILES" ]]; then
            gh release create "${RELEASE_TAG}" \
              --repo "${PUBLIC_REPO}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-assets/release-body.txt \
              ${PRERELEASE_FLAG} \
              $ASSET_FILES
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${PUBLIC_REPO}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-assets/release-body.txt \
              ${PRERELEASE_FLAG}
          fi

          echo "Ō£ģ Release ${RELEASE_TAG} created in public repository"
        fi
    
    - name: Publish release to Supabase Storage
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        BOSS_UPDATE_BUCKET: ${{ vars.BOSS_UPDATE_BUCKET }}
        RELEASE_TAG: ${{ steps.download.outputs.RELEASE_TAG }}
        RELEASE_PRERELEASE: ${{ steps.download.outputs.RELEASE_PRERELEASE }}
      run: |
        set -euo pipefail

        # Non-breaking: until the Supabase service-role secret is configured this
        # step is a silent no-op, so adding it can't break existing releases.
        if [[ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
          echo "Ōä╣’ĖÅ  SUPABASE_SERVICE_ROLE_KEY not set; skipping Supabase publish."
          exit 0
        fi
        export SUPABASE_URL="${SUPABASE_URL:-https://api.risaboss.com}"

        BUCKET="${BOSS_UPDATE_BUCKET:-app-releases}"
        VERSION="${RELEASE_TAG#v}"
        if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
          CHANNEL="$(printf '%s' "$VERSION" | sed -nE 's/.*-([a-zA-Z]+).*/\1/p')"
          [[ -z "$CHANNEL" ]] && CHANNEL="alpha"
        else
          CHANNEL="stable"
        fi

        # The auto-generated GitHub release body (downloads table + install
        # steps) is only a placeholder ŌĆö the update dialog renders
        # release_notes as its "What's new". Prefer the curated notes the
        # release-notes workflow commits to main; read them from a fresh
        # origin/main because that commit usually lands after this job's
        # checkout. For a brand-new release the file may not exist yet ŌĆö the
        # release-notes workflow then patches the row itself once it does
        # (scripts/sync-supabase-release-notes.sh).
        # Best-effort refresh: origin/main already exists from the
        # fetch-depth-0 checkout, so a transient fetch failure must not
        # abort the publish (and its Realtime push) over notes freshness.
        git fetch origin main || echo "ŌÜĀ’ĖÅ  git fetch failed; using origin/main from checkout"
        if git cat-file -e "origin/main:docs/release-notes/v${VERSION}.md" 2>/dev/null; then
          git show "origin/main:docs/release-notes/v${VERSION}.md" > release-assets/release-body.txt
          echo "­¤ōØ Using curated release notes from docs/release-notes/v${VERSION}.md"
        else
          echo "Ōä╣’ĖÅ  docs/release-notes/v${VERSION}.md not on origin/main yet; keeping GitHub release body"
        fi

        echo "­¤ōż Publishing BOSS $VERSION (channel=$CHANNEL) to Supabase bucket '$BUCKET'"
        bash scripts/publish-supabase-release.sh boss "$VERSION" "$CHANNEL" release-assets "$BUCKET"

    - name: Update public repository README
      env:
        GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        RELEASE_TAG: ${{ steps.download.outputs.RELEASE_TAG }}
        PUBLIC_REPO: risa-labs-inc/BossConsole-Releases
      run: |
        set -euo pipefail

        CURRENT_DATE=$(date +"%Y-%m-%d")

        # Validate variables
        if [[ -z "${RELEASE_TAG}" ]]; then
          echo "Error: RELEASE_TAG is empty"
          exit 1
        fi

        # Setup Git credentials securely
        git config --global credential.helper store
        echo "https://token:${GH_TOKEN}@github.com" > ~/.git-credentials

        # Clone public repository
        git clone "https://github.com/${PUBLIC_REPO}.git" public-repo
        cd public-repo

        # Configure git
        git config user.name "Shivang"
        git config user.email "shivang.iitk@gmail.com"

        # Create backup of README
        cp README.md README.md.backup

        # Update version and date in README.md with safer patterns
        # Update the downloads table with new version and date
        sed -i "/| \*\*v[0-9]/s/v[0-9]\+\.[0-9]\+\.[0-9]\+[^|]*/v${RELEASE_TAG##v}/g" README.md
        sed -i "/| \*\*v[0-9]/s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/${CURRENT_DATE}/g" README.md

        # Update badge version
        sed -i "s/BOSS-v[0-9]\+\.[0-9]\+\.[0-9]\+/BOSS-v${RELEASE_TAG##v}/g" README.md

        # Update release notes section
        sed -i "/### \*\*v[0-9]/s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v${RELEASE_TAG##v}/g" README.md
        sed -i "/### \*\*v[0-9]/,/^$/{s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/${CURRENT_DATE}/g}" README.md

        # Check if any changes were made
        if ! diff README.md.backup README.md > /dev/null 2>&1; then
          echo "­¤ōØ Changes detected in README.md"
          git add README.md
          git commit -m "Update README for release ${RELEASE_TAG}

          - Updated version to ${RELEASE_TAG}
          - Updated release date to ${CURRENT_DATE}
          - Updated download links and badges

          ­¤ż¢ Automated update via release sync workflow"

          git push origin main
          echo "Ō£ģ Public repository README updated successfully"
        else
          echo "Ōä╣’ĖÅ  No changes needed in README.md"
        fi

        # Cleanup
        rm -f ~/.git-credentials

    - name: Notify completion
      env:
        RELEASE_TAG: ${{ steps.download.outputs.RELEASE_TAG }}
        PUBLIC_REPO: risa-labs-inc/BossConsole-Releases
      run: |
        echo "­¤Äē Release sync completed successfully!"
        echo "­¤ō” Release: ${RELEASE_TAG}"
        echo "­¤īÉ Public Repository: https://github.com/${PUBLIC_REPO}"
        echo "­¤ōź Download: https://github.com/${PUBLIC_REPO}/releases/latest"