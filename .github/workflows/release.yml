  build-windows:
    needs: prepare-version
    if: needs.prepare-version.outputs.should-build == 'true'
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-version.outputs.updated-sha }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🎯 Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: 🔧 Setup Build Environment
        run: |
          echo "🔧 Setting up build environment for Windows"
          echo "📦 Version: ${{ needs.prepare-version.outputs.version }}"

          # Verify version consistency
          ./gradlew showVersion

      - name: 🔍 Get JxBrowser Version
        shell: bash
        run: |
          # Extract JxBrowser version from libs.versions.toml for Chromium URL
          JXBROWSER_VERSION=$(grep '^jxbrowser = "' gradle/libs.versions.toml | sed 's/.*= "\(.*\)"/\1/')
          echo "JxBrowser version: $JXBROWSER_VERSION"
          echo "JXBROWSER_VERSION=$JXBROWSER_VERSION" >> $GITHUB_ENV

      - name: 📥 Download Branded Chromium (Windows)
        shell: bash
        run: |
          echo "📥 Downloading BOSS-branded Chromium for Windows..."

          CHROMIUM_URL="https://github.com/risa-labs-inc/BossConsole-Releases/releases/download/chromium-v$JXBROWSER_VERSION/boss-chromium-windows-x64.zip"

          mkdir -p branded-chromium
          if curl -L --fail -o branded-chromium/boss-chromium-windows-x64.zip "$CHROMIUM_URL"; then
            echo "✅ Downloaded branded Chromium"
            unzip -o branded-chromium/boss-chromium-windows-x64.zip -d branded-chromium/
            echo "BRANDED_CHROMIUM_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "⚠️ Branded Chromium not available yet"
            echo "BRANDED_CHROMIUM_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: 🏗️ Build Windows App
        run: |
          echo "🏗️ Building Windows app..."
          ./gradlew createDistributable
          echo "✅ Windows app build completed"

      - name: 📦 Bundle Branded Chromium (Windows)
        if: env.BRANDED_CHROMIUM_AVAILABLE == 'true'
        shell: bash
        run: |
          echo "📦 Bundling BOSS-branded Chromium into Windows app..."

          # Find the app directory
          APP_DIR=$(find composeApp/build/compose/binaries/main/app -type d -name "BOSS" | head -1)

          if [[ -n "$APP_DIR" && -d "$APP_DIR" ]]; then
            echo "Found app directory: $APP_DIR"

            # Create chromium directory alongside the app
            CHROMIUM_DIR="$APP_DIR/chromium"
            mkdir -p "$CHROMIUM_DIR"

            # Copy branded Chromium files
            cp -r branded-chromium/* "$CHROMIUM_DIR/" 2>/dev/null || true
            rm -f "$CHROMIUM_DIR"/*.zip 2>/dev/null || true

            echo "✅ Branded Chromium bundled at: $CHROMIUM_DIR"
            ls -la "$CHROMIUM_DIR"
          else
            echo "⚠️ App directory not found, skipping Chromium bundling"
          fi

      - name: 🏗️ Package Windows MSI
        run: |
          echo "🏗️ Packaging Windows MSI..."
          ./gradlew packageMsi
          echo "✅ Windows MSI build completed successfully"

      - name: 🔍 Verify Built Version (Windows)
        env:
          EXPECTED_VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail

          echo "🔍 Verifying version inside built artifacts..."
          echo "Expected version: $EXPECTED_VERSION"

          # Check generated VersionConstants.kt
          GENERATED_FILE="composeApp/build/generated/source/version/ai/rever/boss/utils/VersionConstants.kt"
          if [[ -f "$GENERATED_FILE" ]]; then
            echo "Checking generated VersionConstants.kt..."

            # Use anchored patterns to avoid matching comments or other lines
            MAJOR=$(grep -E "^\s*const val MAJOR\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            MINOR=$(grep -E "^\s*const val MINOR\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            PATCH=$(grep -E "^\s*const val PATCH\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            # Extract prerelease - handles both "null" and quoted string like "beta.1"
            PRERELEASE=$(grep -E "^\s*(const\s+)?val\s+PRERELEASE" "$GENERATED_FILE" | sed 's/.*= //;s/"//g;s/ .*//')
            if [[ "$PRERELEASE" == "null" ]]; then
              PRERELEASE=""
            fi

            if [[ -n "$PRERELEASE" ]]; then
              BUILT_VERSION="${MAJOR}.${MINOR}.${PATCH}-${PRERELEASE}"
            else
              BUILT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            echo "Built version (from VersionConstants.kt): $BUILT_VERSION"

            if [[ "$BUILT_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "❌ VERSION MISMATCH DETECTED!"
              echo "   Expected: $EXPECTED_VERSION"
              echo "   Built: $BUILT_VERSION"
              echo "   This is the root cause of Issue #111"
              echo ""
              echo "VersionConstants.kt contents:"
              cat "$GENERATED_FILE"
              exit 1
            else
              echo "✅ Version verification passed: $BUILT_VERSION"
            fi
          else
            echo "⚠️ VersionConstants.kt not found - this indicates build issue"
            exit 1
          fi
        shell: bash

      - name: Check if signing secret is available
        id: check-secret
        run: |
          if [ -n "$CERT_HOST" ]; then
            echo "can_sign=true" >> $GITHUB_OUTPUT
          else
            echo "can_sign=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
        env:
          CERT_HOST: ${{ secrets.CODE_SIGNING_CERT_HOST }}

      - name: Find MSI File
        id: find-msi
        run: |
          $msiFiles = Get-ChildItem "composeApp/build/compose/binaries/main/msi/BOSS-*.msi" -ErrorAction SilentlyContinue
          if ($msiFiles) {
            $msiPath = $msiFiles[0].FullName
            Write-Host "Found MSI: $msiPath"
            echo "msi-path=$msiPath" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "MSI file not found!"
            exit 1
          }
        shell: powershell

      - name: Decode Client Certificate
        if: ${{ steps.check-secret.outputs.can_sign == 'true' }}
        run: |
          try {
            $certContent = "${{ secrets.CODE_SIGNING_CLIENT_CERT }}"
            $certBytes = [System.Convert]::FromBase64String($certContent)
            $certPath = "${{ runner.temp }}\Certificate_pkcs12.p12"
            [System.IO.File]::WriteAllBytes($certPath, $certBytes)
            Write-Host "Client cert decoded successfully to $certPath"
          } catch {
            Write-Host "Error decoding client cert: $_"
            exit 1
          }
        shell: powershell

      - name: Verify Client Cert File Exists
        if: ${{ steps.check-secret.outputs.can_sign == 'true' }}
        run: |
          $certPath = "${{ runner.temp }}\Certificate_pkcs12.p12"
          if (Test-Path $certPath) {
            Write-Host "[OK] Cert file exists at $certPath"
            Write-Host "File size: $((Get-Item $certPath).Length) bytes"
          } else {
            Write-Host "[ERROR] Cert file MISSING at $certPath"
            exit 1
          }
        shell: powershell

      - name: Install DigiCert STM Client Tools
        if: ${{ steps.check-secret.outputs.can_sign == 'true' }}
        uses: digicert/ssm-code-signing@v1.2.1
        env:
          SM_HOST: ${{ secrets.CODE_SIGNING_CERT_HOST }}
          SM_API_KEY: ${{ secrets.CODE_SIGNING_CERT_HOST_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\Certificate_pkcs12.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CLIENT_CERT_PASSWORD }}

      - name: Reset SMCTL Credentials
        if: ${{ steps.check-secret.outputs.can_sign == 'true' }}
        run: |
          smctl credentials delete
          smctl credentials save ${{ secrets.CODE_SIGNING_CERT_HOST_API_KEY }} ${{ secrets.CODE_SIGNING_CLIENT_CERT_PASSWORD }}
        shell: cmd
        env:
          SM_HOST: ${{ secrets.CODE_SIGNING_CERT_HOST }}
          SM_API_KEY: ${{ secrets.CODE_SIGNING_CERT_HOST_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\Certificate_pkcs12.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CLIENT_CERT_PASSWORD }}

      - name: Sign Windows MSI with DigiCert KeyLocker
        if: ${{ steps.check-secret.outputs.can_sign == 'true' }}
        run: |
          echo "Signing MSI: ${{ steps.find-msi.outputs.msi-path }}"
          echo "Using keypair: ${{ secrets.CODE_SIGNING_KEYPAIR_ALIAS }}"
          smctl sign --keypair-alias "${{ secrets.CODE_SIGNING_KEYPAIR_ALIAS }}" --input "${{ steps.find-msi.outputs.msi-path }}"
        shell: bash
        env:
          SM_HOST: ${{ secrets.CODE_SIGNING_CERT_HOST }}
          SM_API_KEY: ${{ secrets.CODE_SIGNING_CERT_HOST_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\Certificate_pkcs12.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CLIENT_CERT_PASSWORD }}

      - name: Check SMKSP Log (for diagnostics)
        if: always()  # Runs even if signing fails
        run: |
          $logPath = "$env:USERPROFILE\.signingmanager\logs\smksp.log"
          if (Test-Path $logPath) {
            Write-Host "SMKSP Log Contents:"
            Get-Content $logPath -Tail 50  # Last 50 lines for recent errors
          } else {
            Write-Host "SMKSP log not found."
          }
        shell: powershell

      - name: 📊 Verify Build Artifacts
        run: |
          $msiPath = "composeApp/build/compose/binaries/main/msi/BOSS-*.msi"
          $msiFiles = Get-ChildItem $msiPath -ErrorAction SilentlyContinue
          if ($msiFiles) {
            Write-Host "✅ MSI found: $($msiFiles[0].FullName)"
            Write-Host "   Size: $([math]::Round($msiFiles[0].Length/1MB,2)) MB"
          } else {
            Write-Host "❌ MSI not found at expected location"
            Write-Host "Searching for MSI files recursively..."
            $allMsi = Get-ChildItem "composeApp/build" -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue
            if ($allMsi) {
              Write-Host "Found MSI at: $($allMsi[0].FullName)"
            } else {
              Write-Host "No MSI files found anywhere in build directory"
              exit 1
            }
          }
        shell: powershell

      - name: 📤 Upload Windows MSI
        uses: actions/upload-artifact@v7
        with:
          name: boss-windows-${{ needs.prepare-version.outputs.version }}
          path: composeApp/build/compose/binaries/main/msi/
          retention-days: 30

  build-windows-arm64:
    needs: prepare-version
    if: needs.prepare-version.outputs.should-build == 'true'
    runs-on: windows-11-arm
    continue-on-error: true  # Graceful failure if ARM runner unavailable

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-version.outputs.updated-sha }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'microsoft'  # Temurin doesn't have JDK 17 for Windows ARM64

      - name: 🎯 Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: 🔧 Setup Build Environment
        shell: powershell
        run: |
          Write-Host "Setting up build environment for Windows ARM64"
          Write-Host "Version: ${{ needs.prepare-version.outputs.version }}"
          ./gradlew showVersion

      - name: 🔍 Get JxBrowser Version
        shell: powershell
        run: |
          $content = Get-Content 'gradle/libs.versions.toml' -Raw
          if ($content -match 'jxbrowser = "([^"]+)"') {
            $JXBROWSER_VERSION = $matches[1]
            Write-Host "JxBrowser version: $JXBROWSER_VERSION"
            "JXBROWSER_VERSION=$JXBROWSER_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: 📥 Download Branded Chromium (Windows ARM64)
        shell: powershell
        run: |
          Write-Host "Downloading BOSS-branded Chromium for Windows ARM64..."
          $CHROMIUM_URL = "https://github.com/risa-labs-inc/BossConsole-Releases/releases/download/chromium-v$env:JXBROWSER_VERSION/boss-chromium-windows-arm64.zip"
          New-Item -ItemType Directory -Force -Path 'branded-chromium' | Out-Null
          try {
            Invoke-WebRequest -Uri $CHROMIUM_URL -OutFile 'branded-chromium/boss-chromium-windows-arm64.zip' -ErrorAction Stop
            Write-Host "Downloaded branded Chromium"
            Expand-Archive -Path 'branded-chromium/boss-chromium-windows-arm64.zip' -DestinationPath 'branded-chromium' -Force
            "BRANDED_CHROMIUM_AVAILABLE=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } catch {
            Write-Host "Branded Chromium not available yet"
            "BRANDED_CHROMIUM_AVAILABLE=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: 🏗️ Build Windows ARM64 App
        shell: powershell
        run: |
          Write-Host "Building Windows ARM64 app..."
          ./gradlew createDistributable
          Write-Host "Windows ARM64 app build completed"

      - name: 📦 Bundle Branded Chromium (Windows ARM64)
        if: env.BRANDED_CHROMIUM_AVAILABLE == 'true'
        shell: powershell
        run: |
          Write-Host "Bundling BOSS-branded Chromium into Windows ARM64 app..."
          $APP_DIR = Get-ChildItem -Path 'composeApp/build/compose/binaries/main/app' -Directory -Recurse | Where-Object { $_.Name -eq 'BOSS' } | Select-Object -First 1
          if ($APP_DIR) {
            Write-Host "Found app directory: $($APP_DIR.FullName)"
            $CHROMIUM_DIR = Join-Path $APP_DIR.FullName 'chromium'
            New-Item -ItemType Directory -Force -Path $CHROMIUM_DIR | Out-Null
            Copy-Item -Path 'branded-chromium/*' -Destination $CHROMIUM_DIR -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -Path "$CHROMIUM_DIR/*.zip" -Force -ErrorAction SilentlyContinue
            Write-Host "Branded Chromium bundled at: $CHROMIUM_DIR"
            Get-ChildItem $CHROMIUM_DIR
          } else {
            Write-Host "App directory not found, skipping Chromium bundling"
          }

      - name: 🏗️ Package Windows ARM64 MSI
        shell: powershell
        run: |
          Write-Host "Packaging Windows ARM64 MSI..."
          ./gradlew packageMsi
          Write-Host "Windows ARM64 MSI build completed successfully"

      - name: 🔍 Verify Built Version (Windows ARM64)
        shell: powershell
        env:
          EXPECTED_VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Verifying version inside built artifacts..."
          Write-Host "Expected version: $env:EXPECTED_VERSION"
          $GENERATED_FILE = 'composeApp/build/generated/source/version/ai/rever/boss/utils/VersionConstants.kt'
          if (Test-Path $GENERATED_FILE) {
            Write-Host "Checking generated VersionConstants.kt..."
            $content = Get-Content $GENERATED_FILE -Raw
            # Use multiline mode (?m) so ^ matches start of each line
            $MAJOR = if ($content -match '(?m)^\s*const val MAJOR\s*=\s*(\d+)') { $matches[1] } else { '' }
            $MINOR = if ($content -match '(?m)^\s*const val MINOR\s*=\s*(\d+)') { $matches[1] } else { '' }
            $PATCH = if ($content -match '(?m)^\s*const val PATCH\s*=\s*(\d+)') { $matches[1] } else { '' }
            # Extract prerelease - handles both null and quoted string like "beta.1"
            $PRERELEASE = ''
            if ($content -match '(?m)^\s*(const\s+)?val\s+PRERELEASE[^=]*=\s*"([^"]+)"') {
              $PRERELEASE = $matches[2]
            }
            if ($PRERELEASE) {
              $BUILT_VERSION = "$MAJOR.$MINOR.$PATCH-$PRERELEASE"
            } else {
              $BUILT_VERSION = "$MAJOR.$MINOR.$PATCH"
            }
            Write-Host "Built version (from VersionConstants.kt): $BUILT_VERSION"
            if ($BUILT_VERSION -ne $env:EXPECTED_VERSION) {
              Write-Host "VERSION MISMATCH DETECTED!"
              Write-Host "Expected: $env:EXPECTED_VERSION"
              Write-Host "Built: $BUILT_VERSION"
              exit 1
            } else {
              Write-Host "Version verification passed: $BUILT_VERSION"
            }
          } else {
            Write-Host "VersionConstants.kt not found - this indicates build issue"
            exit 1
          }

      - name: 📊 Verify Build Artifacts (Windows ARM64)
        shell: powershell
        run: |
          $msiPath = 'composeApp/build/compose/binaries/main/msi/BOSS-*.msi'
          $msiFiles = Get-ChildItem $msiPath -ErrorAction SilentlyContinue
          if ($msiFiles) {
            Write-Host "MSI found: $($msiFiles[0].FullName)"
            Write-Host "Size: $([math]::Round($msiFiles[0].Length/1MB,2)) MB"
          } else {
            Write-Host "MSI not found at expected location"
            Write-Host "Searching for MSI files recursively..."
            $allMsi = Get-ChildItem 'composeApp/build' -Recurse -Filter '*.msi' -ErrorAction SilentlyContinue
            if ($allMsi) {
              Write-Host "Found MSI at: $($allMsi[0].FullName)"
            } else {
              Write-Host "No MSI files found anywhere in build directory"
              exit 1
            }
          }

      - name: 📤 Upload Windows ARM64 MSI
        uses: actions/upload-artifact@v7
        with:
          name: boss-windows-arm64-${{ needs.prepare-version.outputs.version }}
          path: composeApp/build/compose/binaries/main/msi/
          retention-days: 30

  create-release:
    needs: [prepare-version, build-macos-arm64, build-linux-amd64, build-linux-arm64, build-windows, build-windows-arm64]
    # Run if required builds succeed, even if ARM64 fails/is cancelled (ARM64 is optional)
    if: |
      always() &&
      needs.prepare-version.outputs.should-build == 'true' &&
      needs.build-macos-arm64.result == 'success' &&
      needs.build-linux-amd64.result == 'success' &&
      needs.build-windows.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-version.outputs.updated-sha }}

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: ☕ Setup JDK 17 (for upstream-jar assembly)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🎯 Setup Gradle (for upstream-jar assembly)
        uses: gradle/actions/setup-gradle@v6

      - name: 📦 Assemble upstream IPC JARs
        run: |
          set -euo pipefail
          # Phase 1 of microkernel-runtime extraction. Produces
          # boss-ipc-<ipcVersion>.jar, boss-ui-sdk-<ipcVersion>.jar,
          # plugin-api-ipc-<ipcVersion>.jar, plugin-api-core-<ipcVersion>.jar
          # under build/upstream-artifacts/. The standalone runtime repo
          # downloads these at build time.
          ./gradlew assembleUpstreamJars --no-daemon
          echo "Upstream IPC artifacts:"
          ls -lh build/upstream-artifacts/

      - name: 📋 Prepare Release Assets
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail

          echo "📋 Preparing release assets..."
          mkdir -p ./release-assets

          # Upstream IPC jars — appended to every BossConsole release.
          # File names are <module>-<ipcVersion>.jar (independent of
          # BossConsole's app version) so consumers can pin by IPC version.
          cp build/upstream-artifacts/*.jar ./release-assets/ 2>/dev/null || true

          # Copy and rename artifacts with consistent naming

          # macOS Universal (ARM64, works on Intel via Rosetta 2)
          find ./artifacts -name "*.dmg" -path "*macos-arm64*" -exec cp {} ./release-assets/BOSS-${VERSION}-Universal.dmg \; 2>/dev/null || true

          # Windows x64
          find ./artifacts -name "*.msi" -path "*boss-windows-$VERSION*" -exec cp {} ./release-assets/BOSS-${VERSION}.msi \; 2>/dev/null || true

          # Windows ARM64 (tolerate missing - ARM64 build may fail)
          find ./artifacts -name "*.msi" -path "*arm64*" -exec cp {} ./release-assets/BOSS-${VERSION}-arm64.msi \; 2>/dev/null || true

          # Linux AMD64 artifacts (use path matching)
          find ./artifacts -name "*.deb" -path "*amd64*" -exec cp {} ./release-assets/BOSS-${VERSION}-amd64.deb \; 2>/dev/null || true
          find ./artifacts -name "*.rpm" -path "*amd64*" -exec cp {} ./release-assets/BOSS-${VERSION}-amd64.rpm \; 2>/dev/null || true
          find ./artifacts -name "*-all.jar" -path "*amd64*" -exec cp {} ./release-assets/BOSS-${VERSION}-amd64.jar \; 2>/dev/null || true

          # Linux ARM64 artifacts (tolerate missing - ARM64 build may fail)
          find ./artifacts -name "*.deb" -path "*linux-arm64*" -exec cp {} ./release-assets/BOSS-${VERSION}-arm64.deb \; 2>/dev/null || true
          find ./artifacts -name "*.rpm" -path "*linux-arm64*" -exec cp {} ./release-assets/BOSS-${VERSION}-arm64.rpm \; 2>/dev/null || true
          find ./artifacts -name "*-all.jar" -path "*linux-arm64*" -exec cp {} ./release-assets/BOSS-${VERSION}-arm64.jar \; 2>/dev/null || true

          # List final artifacts
          echo "📦 Release assets:"
          ls -la ./release-assets/

      - name: 📝 Generate Release Notes
        id: release-notes
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare-version.outputs.is-prerelease }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Generate release notes with prerelease indicator
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            RELEASE_TITLE="🧪 BOSS $VERSION (Pre-release)"
            PRERELEASE_WARNING="
          > ⚠️ **This is a pre-release version.** It may contain bugs or incomplete features.
          > Pre-releases are intended for testing and feedback. For production use, please use the latest stable release.
          "
          else
            RELEASE_TITLE="🚀 BOSS $VERSION"
            PRERELEASE_WARNING=""
          fi

          cat > release-notes.md << EOF
          # $RELEASE_TITLE
          $PRERELEASE_WARNING

          ## 📦 Downloads

          | Platform | Architecture | Package |
          |----------|--------------|---------|
          | **macOS** | Universal (Apple Silicon + Intel via Rosetta) | \`BOSS-${VERSION}-Universal.dmg\` |
          | **Windows** | x64 | \`BOSS-${VERSION}.msi\` |
          | **Windows** | ARM64 | \`BOSS-${VERSION}-arm64.msi\` |
          | **Linux DEB** | AMD64 (x86_64) | \`BOSS-${VERSION}-amd64.deb\` |
          | **Linux DEB** | ARM64 (aarch64) | \`BOSS-${VERSION}-arm64.deb\` |
          | **Linux RPM** | AMD64 (x86_64) | \`BOSS-${VERSION}-amd64.rpm\` |
          | **Linux RPM** | ARM64 (aarch64) | \`BOSS-${VERSION}-arm64.rpm\` |
          | **Linux JAR** | AMD64 (x86_64) | \`BOSS-${VERSION}-amd64.jar\` |
          | **Linux JAR** | ARM64 (aarch64) | \`BOSS-${VERSION}-arm64.jar\` |

          ## ✨ What's New

          - Auto-generated release for version $VERSION
          - Built with centralized version management system
          - All platforms synchronized and tested
          - Full Linux support with native packages (AMD64 and ARM64)

          ## 🔧 System Requirements

          - **macOS**: macOS 11.0+ (Big Sur)
          - **Windows**: Windows 10+ (64-bit)
          - **Linux**: Any modern distribution (AMD64 or ARM64)

          ## 🛠️ Installation

          ### macOS
          1. Download \`BOSS-${VERSION}-Universal.dmg\`
          2. Open the DMG and drag BOSS to Applications
          3. Launch from Applications folder

          > Works on both Apple Silicon and Intel Macs (Intel via Rosetta 2)

          ### Windows (x64)
          1. Download \`BOSS-${VERSION}.msi\`
          2. Run the installer as Administrator
          3. Launch from Start Menu or Desktop

          ### Windows (ARM64)
          1. Download \`BOSS-${VERSION}-arm64.msi\`
          2. Run the installer as Administrator
          3. Launch from Start Menu or Desktop

          ### Linux (AMD64 / x86_64)

          **Ubuntu/Debian:**
          \`\`\`bash
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/BOSS-${VERSION}-amd64.deb
          sudo dpkg -i BOSS-${VERSION}-amd64.deb
          sudo apt-get install -f  # Fix any missing dependencies
          \`\`\`

          **RHEL/Fedora/openSUSE:**
          \`\`\`bash
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/BOSS-${VERSION}-amd64.rpm
          sudo rpm -i BOSS-${VERSION}-amd64.rpm
          \`\`\`

          **JAR (requires Java 17+):**
          \`\`\`bash
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/BOSS-${VERSION}-amd64.jar
          java -jar BOSS-${VERSION}-amd64.jar
          \`\`\`

          ### Linux (ARM64 / aarch64)

          **Ubuntu/Debian:**
          \`\`\`bash
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/BOSS-${VERSION}-arm64.deb
          sudo dpkg -i BOSS-${VERSION}-arm64.deb
          sudo apt-get install -f  # Fix any missing dependencies
          \`\`\`

          **RHEL/Fedora/openSUSE:**
          \`\`\`bash
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/BOSS-${VERSION}-arm64.rpm
          sudo rpm -i BOSS-${VERSION}-arm64.rpm
          \`\`\`

          **JAR (requires Java 17+):**
          \`\`\`bash
          wget https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/BOSS-${VERSION}-arm64.jar
          java -jar BOSS-${VERSION}-arm64.jar
          \`\`\`

          ---

          🤖 *This release was automatically built and published by GitHub Actions*
          EOF

          # Set output for release creation
          echo "notes-file=release-notes.md" >> $GITHUB_OUTPUT

      - name: 🎉 Create GitHub Release
        # Handle different trigger types:
        # - push (tag): always create release
        # - workflow_call: check inputs.create_release (boolean)
        # - workflow_dispatch: check github.event.inputs.create_release (string)
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_call' && inputs.create_release != false) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release != 'false')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare-version.outputs.version }}
          name: ${{ needs.prepare-version.outputs.is-prerelease == 'true' && '🧪 Pre-release' || '🚀 Release' }} BOSS ${{ needs.prepare-version.outputs.version }}
          body_path: ${{ steps.release-notes.outputs.notes-file }}
          files: ./release-assets/*
          draft: false
          prerelease: ${{ needs.prepare-version.outputs.is-prerelease == 'true' }}
          make_latest: ${{ needs.prepare-version.outputs.is-prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: 📢 Release Summary
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Trigger**: ${GITHUB_EVENT_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Platforms Built**: macOS, Linux (AMD64 + ARM64), Windows (x64 + ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Release Created**: https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 🍎 macOS DMG (Universal - Apple Silicon & Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐧 Linux DEB (AMD64 + ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐧 Linux RPM (AMD64 + ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐧 Linux JAR (AMD64 + ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- 🪟 Windows MSI (x64 + ARM64)" >> $GITHUB_STEP_SUMMARY
