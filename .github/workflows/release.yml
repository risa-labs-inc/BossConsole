# NOTE: The exact `name:` below is referenced by .github/workflows/sync-release.yml
# in its `workflow_run.workflows` filter. If you rename this workflow, update the
# sync-release trigger too — there is no compile-time check and a mismatch will
# silently stop auto-syncing public releases.
name: 🚀 Release Build

on:
  workflow_dispatch:
    inputs:
      version_increment:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - alpha
          - beta
          - rc
      prerelease_number:
        description: 'Prerelease number (for alpha/beta/rc)'
        required: false
        default: '1'
      create_release:
        description: 'Create GitHub release'
        required: true
        default: true
        type: boolean
  # Allow this workflow to be called from other workflows (e.g., promote-release)
  workflow_call:
    inputs:
      version_increment:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: string
      prerelease_number:
        description: 'Prerelease number (for alpha/beta/rc)'
        required: false
        default: '1'
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean
      skip_version_increment:
        description: 'Skip version increment (for promotion)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*.*.*'

env:
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'
  # Production credentials for release builds
  JXBROWSER_LICENSE_KEY: ${{ secrets.JXBROWSER_LICENSE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
  # boss-plugin-api-core resolves from GitHub Packages during every gradle
  # invocation; step-level GITHUB_TOKEN assignments still override this.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    # Owner-approval gate: the 'release' environment requires a review before
    # this job starts, and every other job needs it — one approval gates the
    # whole run. Mirrors the BossTerm release workflow.
    environment: release
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
      should-build: ${{ steps.check-changes.outputs.should-build }}
      updated-sha: ${{ steps.commit-version.outputs.updated-sha }}
      should-create-tag: ${{ steps.commit-version.outputs.should-create-tag }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: 🔄 Increment Version (Manual Trigger)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        env:
          # Pass inputs via environment variables to prevent script injection
          INPUT_VERSION_INCREMENT: ${{ inputs.version_increment || github.event.inputs.version_increment }}
          INPUT_RELEASE_TYPE: ${{ inputs.release_type || github.event.inputs.release_type }}
          INPUT_PRERELEASE_NUM: ${{ inputs.prerelease_number || github.event.inputs.prerelease_number }}
          INPUT_SKIP_INCREMENT: ${{ inputs.skip_version_increment }}
        run: |
          set -euo pipefail

          # Source shared version utilities
          source .github/scripts/version-utils.sh

          # Validate version_increment is one of the allowed values
          case "$INPUT_VERSION_INCREMENT" in
            patch|minor|major) VERSION_INCREMENT="$INPUT_VERSION_INCREMENT" ;;
            *) echo "❌ Invalid version_increment: $INPUT_VERSION_INCREMENT"; exit 1 ;;
          esac

          # Validate release_type using shared function
          if ! validate_release_type "$INPUT_RELEASE_TYPE"; then
            echo "❌ Invalid release_type: $INPUT_RELEASE_TYPE"
            exit 1
          fi
          RELEASE_TYPE="$INPUT_RELEASE_TYPE"

          # Validate prerelease_number using shared function
          PRERELEASE_NUM="${INPUT_PRERELEASE_NUM:-1}"
          if ! validate_prerelease_number "$PRERELEASE_NUM"; then
            echo "❌ Invalid prerelease_number: '$PRERELEASE_NUM'"
            echo "   Must be a positive integer (e.g., 1, 2, 3)"
            exit 1
          fi

          SKIP_INCREMENT="${INPUT_SKIP_INCREMENT:-false}"

          # Skip version increment if requested (for promotion scenarios)
          if [[ "$SKIP_INCREMENT" != "true" ]]; then
            # Increment version based on input
            # Note: -PskipGitCheck=true because CI controls git state
            case "$VERSION_INCREMENT" in
              "patch")
                ./gradlew incrementVersion -PskipGitCheck=true
                ;;
              "minor")
                ./gradlew incrementMinor -PskipGitCheck=true
                ;;
              "major")
                ./gradlew incrementMajor -PskipGitCheck=true
                ;;
            esac
          else
            echo "Skipping version increment (promotion mode)"
          fi

          # Set prerelease suffix if not stable
          # Note: -PskipGitCheck=true because CI controls git state
          if [[ "$RELEASE_TYPE" != "stable" ]] && [[ -n "$RELEASE_TYPE" ]]; then
            echo "Setting prerelease suffix: ${RELEASE_TYPE}.${PRERELEASE_NUM}"
            ./gradlew setPrereleaseSuffix -Psuffix="${RELEASE_TYPE}.${PRERELEASE_NUM}" -PskipGitCheck=true
          else
            # Ensure we clear any existing prerelease suffix for stable releases
            ./gradlew clearPrereleaseSuffix -PskipGitCheck=true
          fi

          # Get the new version
          NEW_VERSION=$(grep "^app.version=" version.properties | cut -d'=' -f2)
          echo "New version: $NEW_VERSION"

      - name: 📝 Commit Version Changes
        id: commit-version
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Configure git
          git config user.name "Shivang"
          git config user.email "shivang.iitk@gmail.com"

          # Check if there are changes to commit
          if git diff --quiet version.properties; then
            echo "No version changes to commit"
            echo "updated-sha=$GITHUB_SHA" >> $GITHUB_OUTPUT
          else
            # Commit version changes
            NEW_VERSION=$(grep "^app.version=" version.properties | cut -d'=' -f2)
            git add version.properties
            git commit -m "🔖 Bump version to $NEW_VERSION" \
                       -m "Auto-increment version for release build" \
                       -m "🤖 Automated by release workflow"

            # Handle race condition: pull --rebase and retry push up to 3 times
            MAX_RETRIES=3
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if git push; then
                echo "✅ Successfully pushed version changes"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⚠️ Push failed, attempting rebase and retry ($RETRY_COUNT/$MAX_RETRIES)..."
                  git pull --rebase origin main
                else
                  echo "❌ Failed to push after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done

            # DO NOT create tag here - will be created after successful builds
            # Get the new commit SHA
            NEW_SHA=$(git rev-parse HEAD)
            echo "updated-sha=$NEW_SHA" >> $GITHUB_OUTPUT
            echo "should-create-tag=true" >> $GITHUB_OUTPUT
            echo "✅ Version committed: $NEW_VERSION (tag will be created after builds)"
          fi

      - name: 📋 Get Version
        id: get-version
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_RELEASE_TYPE: ${{ inputs.release_type || github.event.inputs.release_type }}
        run: |
          set -euo pipefail

          # Source shared version utilities
          source .github/scripts/version-utils.sh

          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            # Extract version from tag (e.g., refs/tags/v8.11.2 -> 8.11.2)
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"

            # Validate tag version format using shared function
            if ! validate_version "$TAG_VERSION"; then
              echo "❌ Invalid tag version format: $TAG_VERSION"
              exit 1
            fi

            echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
            echo "📦 Building version from tag: $TAG_VERSION"

            # Detect prerelease from tag version string using shared function
            if is_prerelease_version "$TAG_VERSION"; then
              echo "is-prerelease=true" >> $GITHUB_OUTPUT
              echo "🧪 Detected prerelease version"
            else
              echo "is-prerelease=false" >> $GITHUB_OUTPUT
            fi

            # Verify tag version matches version.properties
            PROPS_VERSION=$(grep "^app.version=" version.properties | cut -d'=' -f2)
            if [[ "$TAG_VERSION" != "$PROPS_VERSION" ]]; then
              echo "⚠️ Warning: Tag version ($TAG_VERSION) differs from version.properties ($PROPS_VERSION)"
              echo "Updating version.properties to match tag version for build consistency"

              # Parse tag version using shared functions
              BASE_VERSION=$(get_base_version "$TAG_VERSION")
              IFS='.' read -r TAG_MAJOR TAG_MINOR TAG_PATCH <<< "$BASE_VERSION"
              PRERELEASE_SUFFIX=$(get_prerelease_suffix "$TAG_VERSION")

              # Validate parsed components
              if ! [[ "$TAG_MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$TAG_MINOR" =~ ^[0-9]+$ ]] || ! [[ "$TAG_PATCH" =~ ^[0-9]+$ ]]; then
                echo "❌ Failed to parse version components from: $TAG_VERSION"
                exit 1
              fi

              # Update version.properties to match tag
              sed -i "s/^app.version.major=.*/app.version.major=$TAG_MAJOR/" version.properties
              sed -i "s/^app.version.minor=.*/app.version.minor=$TAG_MINOR/" version.properties
              sed -i "s/^app.version.patch=.*/app.version.patch=$TAG_PATCH/" version.properties
              sed -i "s/^app.version=.*/app.version=$TAG_VERSION/" version.properties
              sed -i "s/^app.bundle.version=.*/app.bundle.version=$TAG_VERSION/" version.properties
              sed -i "s/^app.prerelease.suffix=.*/app.prerelease.suffix=$PRERELEASE_SUFFIX/" version.properties

              echo "✅ Updated version.properties to match tag: $TAG_VERSION"
            fi
          else
            # Use version from properties file
            VERSION=$(grep "^app.version=" version.properties | cut -d'=' -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "📦 Building version from properties: $VERSION"

            # Detect prerelease from version string or release_type input
            RELEASE_TYPE="${INPUT_RELEASE_TYPE:-stable}"
            if is_prerelease_version "$VERSION" || [[ "$RELEASE_TYPE" != "stable" && "$RELEASE_TYPE" != "" ]]; then
              echo "is-prerelease=true" >> $GITHUB_OUTPUT
              echo "🧪 This is a prerelease version"
            else
              echo "is-prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 🔍 Check for Changes
        id: check-changes
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          # Build on both manual trigger and tag pushes
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] || [[ "$GITHUB_EVENT_NAME" == "workflow_call" ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "trigger=manual" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "trigger=tag" >> $GITHUB_OUTPUT
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "trigger=none" >> $GITHUB_OUTPUT
          fi

  build-macos-arm64:
    needs: prepare-version
    if: needs.prepare-version.outputs.should-build == 'true'
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-version.outputs.updated-sha }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🎯 Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: 🔧 Setup Build Environment
        shell: bash
        run: |
          echo "🔧 Setting up build environment for ${{ matrix.platform }}"
          echo "📦 Version: ${{ needs.prepare-version.outputs.version }}"
          
          # Verify version consistency
          ./gradlew showVersion

      # macOS specific setup
      - name: 🍎 Setup macOS Environment
        run: |
          # Install required dependencies for DMG creation
          brew install --quiet create-dmg || true
          
          # Verify macOS build tools
          xcode-select --print-path
          
          # Setup macOS code signing environment with P12 certificate
          if [[ -n "${{ secrets.MACOS_P12_CERTIFICATE }}" ]]; then
            echo "🔐 Setting up macOS code signing with P12 certificate..."
            
            # Decode and install P12 certificate
            echo "${{ secrets.MACOS_P12_CERTIFICATE }}" | base64 --decode > certificate.p12
            
            # Create temporary keychain
            security create-keychain -p temp_password temp_keychain
            security default-keychain -s temp_keychain
            security unlock-keychain -p temp_password temp_keychain
            
            # Set keychain settings
            security set-keychain-settings -lut 3600 temp_keychain
            
            # Import certificate
            security import certificate.p12 -k temp_keychain -P "${{ secrets.MACOS_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
            
            # Allow codesign to access the key
            security set-key-partition-list -S apple-tool:,apple: -s -k temp_password temp_keychain
            
            # Ensure keychain is available for subsequent steps
            security list-keychains -s temp_keychain
            
            # Set up environment variables
            echo "DEVELOPER_ID=${{ secrets.MACOS_DEVELOPER_ID }}" >> $GITHUB_ENV
            echo "MACOS_DEVELOPER_ID=${{ secrets.MACOS_DEVELOPER_ID }}" >> $GITHUB_ENV
            echo "TEAM_ID=${{ secrets.MACOS_TEAM_ID }}" >> $GITHUB_ENV
            echo "APPLE_ID=${{ secrets.MACOS_APPLE_ID }}" >> $GITHUB_ENV
            echo "APP_PASSWORD=${{ secrets.MACOS_APP_PASSWORD }}" >> $GITHUB_ENV
            echo "DISABLE_MACOS_SIGNING=false" >> $GITHUB_ENV
            
            # Clean up certificate file
            rm certificate.p12
            
            # Verify certificate installation
            echo "🔍 Verifying certificate installation..."
            security find-identity -v -p codesigning temp_keychain
            
            echo "✅ macOS code signing configured with P12 certificate"
          else
            echo "⚠️ MACOS_P12_CERTIFICATE not found"
            echo "   Add your P12 certificate to GitHub secrets for production builds"
            echo "   Creating unsigned DMG for testing..."
            echo "DISABLE_MACOS_SIGNING=true" >> $GITHUB_ENV
          fi


      - name: 🔍 Get JxBrowser Version
        run: |
          # Extract JxBrowser version from libs.versions.toml for Chromium URL
          JXBROWSER_VERSION=$(grep '^jxbrowser = "' gradle/libs.versions.toml | sed 's/.*= "\(.*\)"/\1/')
          echo "JxBrowser version: $JXBROWSER_VERSION"
          echo "JXBROWSER_VERSION=$JXBROWSER_VERSION" >> $GITHUB_ENV

      - name: 📥 Download Branded Chromium (macOS)
        run: |
          echo "📥 Downloading BOSS-branded Chromium for macOS..."

          # Determine architecture
          ARCH=$(uname -m)
          if [[ "$ARCH" == "arm64" ]]; then
            CHROMIUM_ARCHIVE="boss-chromium-macos-arm64.zip"
          else
            CHROMIUM_ARCHIVE="boss-chromium-macos-x64.zip"
          fi

          # Try to download from BOSS-Chromium releases (version from libs.versions.toml)
          CHROMIUM_URL="https://github.com/risa-labs-inc/BossConsole-Releases/releases/download/chromium-v$JXBROWSER_VERSION/$CHROMIUM_ARCHIVE"

          mkdir -p branded-chromium
          if curl -L --fail -o "branded-chromium/$CHROMIUM_ARCHIVE" "$CHROMIUM_URL"; then
            echo "✅ Downloaded branded Chromium: $CHROMIUM_ARCHIVE"
            unzip -o "branded-chromium/$CHROMIUM_ARCHIVE" -d branded-chromium/
            echo "BRANDED_CHROMIUM_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "⚠️ Branded Chromium not available yet (repository may need initial release)"
            echo "   App will fall back to default JxBrowser Chromium"
            echo "BRANDED_CHROMIUM_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: 🏗️ Build macOS App Bundle
        env:
          DISABLE_MACOS_SIGNING: ${{ env.DISABLE_MACOS_SIGNING }}
        run: |
          echo "🏗️ Building macOS app bundle..."

          chmod +x ./gradlew

          # First create the distributable app bundle
          ./gradlew createDistributable

          echo "✅ macOS app bundle created successfully"

      - name: 📦 Bundle Branded Chromium
        if: env.BRANDED_CHROMIUM_AVAILABLE == 'true'
        run: |
          echo "📦 Bundling BOSS-branded Chromium into app..."

          # Find the app bundle
          APP_PATH=$(find composeApp/build/compose/binaries/main/app -name "*.app" -type d | head -1)

          if [[ -n "$APP_PATH" && -d "$APP_PATH" ]]; then
            echo "Found app bundle: $APP_PATH"

            # Create chromium directory in app resources
            CHROMIUM_DIR="$APP_PATH/Contents/Resources/chromium"
            mkdir -p "$CHROMIUM_DIR"

            # Copy branded Chromium files (excluding the zip)
            cp -r branded-chromium/* "$CHROMIUM_DIR/" 2>/dev/null || true
            rm -f "$CHROMIUM_DIR"/*.zip 2>/dev/null || true

            echo "✅ Branded Chromium bundled at: $CHROMIUM_DIR"
            ls -la "$CHROMIUM_DIR"
          else
            echo "⚠️ App bundle not found, skipping Chromium bundling"
          fi

      - name: 🔐 Sign Bundled Chromium
        if: env.BRANDED_CHROMIUM_AVAILABLE == 'true' && env.DISABLE_MACOS_SIGNING != 'true'
        run: |
          echo "🔐 Signing bundled Chromium binaries..."

          APP_PATH=$(find composeApp/build/compose/binaries/main/app -name "*.app" -type d | head -1)
          CHROMIUM_DIR="$APP_PATH/Contents/Resources/chromium"

          if [[ -d "$CHROMIUM_DIR" ]]; then
            # Sign all executables in Chromium directory
            find "$CHROMIUM_DIR" -type f -perm +111 -exec \
              codesign --force --options runtime \
              --entitlements composeApp/src/desktopMain/resources/BOSS.entitlements \
              --sign "$MACOS_DEVELOPER_ID" {} \; 2>/dev/null || true

            echo "✅ Chromium binaries signed"
          fi

      - name: 🏗️ Package macOS DMG
        env:
          DISABLE_MACOS_SIGNING: ${{ env.DISABLE_MACOS_SIGNING }}
        run: |
          echo "🏗️ Packaging macOS DMG..."

          # Package the DMG using the already-created app bundle
          ./gradlew packageDmg

          echo "✅ macOS DMG build completed successfully"

      - name: 🔍 Verify Built Version (macOS)
        env:
          EXPECTED_VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail

          echo "🔍 Verifying version inside built artifacts..."
          echo "Expected version: $EXPECTED_VERSION"

          # Check generated VersionConstants.kt
          GENERATED_FILE="composeApp/build/generated/source/version/ai/rever/boss/utils/VersionConstants.kt"
          if [[ -f "$GENERATED_FILE" ]]; then
            echo "Checking generated VersionConstants.kt..."

            # Use anchored patterns to avoid matching comments or other lines
            MAJOR=$(grep -E "^\s*const val MAJOR\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            MINOR=$(grep -E "^\s*const val MINOR\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            PATCH=$(grep -E "^\s*const val PATCH\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            # Extract prerelease - handles both "null" and quoted string like "beta.1"
            PRERELEASE=$(grep -E "^\s*(const\s+)?val\s+PRERELEASE" "$GENERATED_FILE" | sed 's/.*= //;s/"//g;s/ .*//')
            if [[ "$PRERELEASE" == "null" ]]; then
              PRERELEASE=""
            fi

            if [[ -n "$PRERELEASE" ]]; then
              BUILT_VERSION="${MAJOR}.${MINOR}.${PATCH}-${PRERELEASE}"
            else
              BUILT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            echo "Built version (from VersionConstants.kt): $BUILT_VERSION"

            if [[ "$BUILT_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "❌ VERSION MISMATCH DETECTED!"
              echo "   Expected: $EXPECTED_VERSION"
              echo "   Built: $BUILT_VERSION"
              echo "   This is the root cause of Issue #111"
              echo ""
              echo "VersionConstants.kt contents:"
              cat "$GENERATED_FILE"
              exit 1
            else
              echo "✅ Version verification passed: $BUILT_VERSION"
            fi
          else
            echo "⚠️ VersionConstants.kt not found - this indicates build issue"
            exit 1
          fi

      # macOS notarization (only for signed DMGs)
      - name: 🍎 Notarize macOS DMG
        if: env.DISABLE_MACOS_SIGNING != 'true'
        run: |
          echo "🍎 Starting macOS notarization process..."

          # Find the DMG file
          DMG_PATH=$(find composeApp/build/compose/binaries/main/dmg -name "*.dmg" | head -1)

          if [[ -n "$DMG_PATH" && -f "$DMG_PATH" ]]; then
            echo "📦 Found DMG: $DMG_PATH"

            # Submit for notarization and capture the submission ID.
            # `|| true` is required because the surrounding shell runs
            # under `bash -e`: without it, a non-zero exit from
            # `notarytool submit` (e.g. auth failure, network error,
            # rejected submission) propagates immediately at the
            # command-substitution assignment, killing the step BEFORE
            # we can echo NOTARIZATION_OUTPUT or fetch the detailed
            # notarytool log. The exit-code is preserved separately so
            # later checks can still distinguish success from failure.
            echo "🔐 Submitting DMG for notarization..."
            set +e
            NOTARIZATION_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "${{ secrets.MACOS_TEAM_ID }}" \
              --wait 2>&1)
            NOTARIZATION_EXIT_CODE=$?
            set -e
            echo "$NOTARIZATION_OUTPUT"
            echo "📋 notarytool exit code: $NOTARIZATION_EXIT_CODE"

            # Extract submission ID from output
            SUBMISSION_ID=$(echo "$NOTARIZATION_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
            echo "📋 Submission ID: $SUBMISSION_ID"

            # Check if notarization succeeded
            if echo "$NOTARIZATION_OUTPUT" | grep -q "status: Accepted"; then
              echo "✅ Notarization accepted"

              # Staple the notarization
              echo "📎 Stapling notarization to DMG..."
              xcrun stapler staple "$DMG_PATH"

              echo "✅ macOS notarization completed successfully"
            else
              echo "❌ Notarization failed or returned non-Accepted status"

              # Fetch detailed log if we have a submission ID
              if [[ -n "$SUBMISSION_ID" ]]; then
                echo "📜 Fetching detailed notarization log..."
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APP_PASSWORD" \
                  --team-id "${{ secrets.MACOS_TEAM_ID }}"
              fi

              exit 1
            fi
          else
            echo "❌ DMG file not found for notarization"
            exit 1
          fi

      # Skip notarization info for unsigned builds
      - name: 🍎 Skip Notarization (Unsigned Build)
        if: env.DISABLE_MACOS_SIGNING == 'true'
        run: |
          echo "ℹ️ Skipping notarization for unsigned DMG"
          echo "   This DMG is for development/testing only"
          echo "   For distribution, add proper code signing certificates"

      - name: 📊 Verify Build Artifacts
        run: |
          echo "📊 Verifying macOS DMG..."
          
          # Check if DMG exists
          if ls composeApp/build/compose/binaries/main/dmg/*.dmg 1> /dev/null 2>&1; then
            echo "✅ DMG found!"
            ls -la composeApp/build/compose/binaries/main/dmg/
          else
            echo "❌ DMG not found!"
            exit 1
          fi

      - name: 📤 Upload macOS DMG (ARM64)
        uses: actions/upload-artifact@v7
        with:
          name: boss-macos-arm64-${{ needs.prepare-version.outputs.version }}
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 30

  build-linux-amd64:
    needs: prepare-version
    if: needs.prepare-version.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-version.outputs.updated-sha }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🎯 Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: 🔧 Setup Build Environment
        run: |
          echo "🔧 Setting up build environment for Linux AMD64"
          echo "📦 Version: ${{ needs.prepare-version.outputs.version }}"

          # Verify version consistency
          ./gradlew showVersion

      - name: 🔍 Get JxBrowser Version
        run: |
          # Extract JxBrowser version from libs.versions.toml for Chromium URL
          JXBROWSER_VERSION=$(grep '^jxbrowser = "' gradle/libs.versions.toml | sed 's/.*= "\(.*\)"/\1/')
          echo "JxBrowser version: $JXBROWSER_VERSION"
          echo "JXBROWSER_VERSION=$JXBROWSER_VERSION" >> $GITHUB_ENV

      - name: 📥 Download Branded Chromium (Linux)
        run: |
          echo "📥 Downloading BOSS-branded Chromium for Linux..."

          CHROMIUM_URL="https://github.com/risa-labs-inc/BossConsole-Releases/releases/download/chromium-v$JXBROWSER_VERSION/boss-chromium-linux-x64.zip"

          mkdir -p branded-chromium
          if curl -L --fail -o branded-chromium/boss-chromium-linux-x64.zip "$CHROMIUM_URL"; then
            echo "✅ Downloaded branded Chromium"
            unzip -o branded-chromium/boss-chromium-linux-x64.zip -d branded-chromium/
            echo "BRANDED_CHROMIUM_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "⚠️ Branded Chromium not available yet"
            echo "   Linux packages will use runtime Chromium download fallback"
            echo "BRANDED_CHROMIUM_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: 🏗️ Build Linux Packages (AMD64)
        run: |
          echo "🏗️ Building Linux AMD64 packages..."

          # Step 1: Create distributable (unpacked app structure)
          ./gradlew :composeApp:createDistributable
          echo "✅ Distributable created"

          # Step 2: Bundle Chromium into the app structure if available
          if [[ "$BRANDED_CHROMIUM_AVAILABLE" == "true" ]]; then
            APP_DIR="composeApp/build/compose/binaries/main/app/BOSS"
            CHROMIUM_DIR="$APP_DIR/lib/chromium"

            echo "📦 Bundling Chromium into Linux app at: $CHROMIUM_DIR"
            mkdir -p "$CHROMIUM_DIR"
            cp -r branded-chromium/* "$CHROMIUM_DIR/" 2>/dev/null || true
            rm -f "$CHROMIUM_DIR"/*.zip 2>/dev/null || true

            echo "✅ Chromium bundled into app structure"
            ls -la "$CHROMIUM_DIR"
          else
            echo "⚠️ Branded Chromium not available, app will use auto-download fallback"
          fi

          # Step 3: Create DEB and RPM from the modified distributable
          ./gradlew :composeApp:packageDeb :composeApp:packageRpm
          echo "✅ Linux native packages (DEB, RPM) created successfully"

          # Create executable JAR for universal Linux distribution
          ./gradlew :composeApp:createExecutableJar
          echo "✅ Executable JAR created successfully"

      - name: 🔍 Verify Built Version (Linux AMD64)
        env:
          EXPECTED_VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail

          echo "🔍 Verifying version inside built artifacts..."
          echo "Expected version: $EXPECTED_VERSION"

          # Check generated VersionConstants.kt
          GENERATED_FILE="composeApp/build/generated/source/version/ai/rever/boss/utils/VersionConstants.kt"
          if [[ -f "$GENERATED_FILE" ]]; then
            echo "Checking generated VersionConstants.kt..."

            # Use anchored patterns to avoid matching comments or other lines
            MAJOR=$(grep -E "^\s*const val MAJOR\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            MINOR=$(grep -E "^\s*const val MINOR\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            PATCH=$(grep -E "^\s*const val PATCH\s*=" "$GENERATED_FILE" | sed 's/.*= //;s/ .*//')
            # Extract prerelease - handles both "null" and quoted string like "beta.1"
            PRERELEASE=$(grep -E "^\s*(const\s+)?val\s+PRERELEASE" "$GENERATED_FILE" | sed 's/.*= //;s/"//g;s/ .*//')
            if [[ "$PRERELEASE" == "null" ]]; then
              PRERELEASE=""
            fi

            if [[ -n "$PRERELEASE" ]]; then
              BUILT_VERSION="${MAJOR}.${MINOR}.${PATCH}-${PRERELEASE}"
            else
              BUILT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            echo "Built version (from VersionConstants.kt): $BUILT_VERSION"

            if [[ "$BUILT_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "❌ VERSION MISMATCH DETECTED!"
              echo "   Expected: $EXPECTED_VERSION"
              echo "   Built: $BUILT_VERSION"
              echo "   This is the root cause of Issue #111"
              echo ""
              echo "VersionConstants.kt contents:"
              cat "$GENERATED_FILE"
              exit 1
            else
              echo "✅ Version verification passed: $BUILT_VERSION"
            fi
          else
            echo "⚠️ VersionConstants.kt not found - this indicates build issue"
            exit 1
          fi

      - name: 📊 Verify Linux Build Artifacts (AMD64)
        run: |
          echo "📊 Verifying Linux AMD64 packages..."

          # Check for DEB files
          if ls composeApp/build/compose/binaries/main/deb/*.deb 1> /dev/null 2>&1; then
            echo "✅ DEB package found!"
            ls -la composeApp/build/compose/binaries/main/deb/
          else
            echo "⚠️ DEB package not found"
          fi

          # Check for RPM files
          if ls composeApp/build/compose/binaries/main/rpm/*.rpm 1> /dev/null 2>&1; then
            echo "✅ RPM package found!"
            ls -la composeApp/build/compose/binaries/main/rpm/
          else
            echo "⚠️ RPM package not found"
          fi

          # Check for JAR files
          if ls composeApp/build/libs/*-all.jar 1> /dev/null 2>&1; then
            echo "✅ Executable JAR found!"
            ls -la composeApp/build/libs/*-all.jar
          else
            echo "⚠️ Executable JAR not found"
          fi

      - name: 📤 Upload Linux Packages (AMD64)
        uses: actions/upload-artifact@v7
        with:
          name: boss-linux-amd64-${{ needs.prepare-version.outputs.version }}
          path: |
            composeApp/build/compose/binaries/main/deb/
            composeApp/build/compose/binaries/main/rpm/
            composeApp/build/libs/*-all.jar
          retention-days: 30

