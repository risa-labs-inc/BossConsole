# SLF4J SimpleLogger configuration for BOSS
# See: http://www.slf4j.org/api/org/slf4j/simple/SimpleLogger.html

# Default log level for all loggers (can be: trace, debug, info, warn, error, off)
org.slf4j.simpleLogger.defaultLogLevel=info

# BOSS application logger level
org.slf4j.simpleLogger.log.ai.rever.boss=info

# LSP/Editor logger level

# Show log name (short format)
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=true

# Show thread name
org.slf4j.simpleLogger.showThreadName=false

# Show timestamp
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS

# Output target (System.out captured by GlobalLogCapture for Console panel)
# Default is System.err, but we want System.out for consistency
org.slf4j.simpleLogger.logFile=System.out

# Suppress noisy third-party loggers
org.slf4j.simpleLogger.log.io.ktor=warn
org.slf4j.simpleLogger.log.io.netty=warn
org.slf4j.simpleLogger.log.com.teamdev=warn
org.slf4j.simpleLogger.log.kotlinx.coroutines=warn

# gRPC's NettyServer unconditionally sets SO_KEEPALIVE on child channels;
# unix-domain-socket channels don't support it, so ServerBootstrap warns on
# every kernel IPC connection. Library behavior, not ours - errors still show.
org.slf4j.simpleLogger.log.io.netty.bootstrap.ServerBootstrap=error
